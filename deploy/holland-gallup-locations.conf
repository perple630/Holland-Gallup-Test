# Holland-Gallup 路径挂载（由 schedule:8080 主站 include，须放在正则 location 之前）
# 访问: http://<host>:8080/holland-gallup/

location ^~ /holland-gallup/api/ {
    proxy_pass http://127.0.0.1:8001/api/;
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
}

location ^~ /holland-gallup/docs {
    proxy_pass http://127.0.0.1:8001/docs;
    proxy_set_header Host $http_host;
}

location ^~ /holland-gallup/redoc {
    proxy_pass http://127.0.0.1:8001/redoc;
    proxy_set_header Host $http_host;
}

location ^~ /holland-gallup/ {
    alias /srv/holland-gallup/frontend/dist/;
    index index.html;
    try_files $uri $uri/ /holland-gallup/index.html;
}

location = /holland-gallup {
    return 301 /holland-gallup/;
}
